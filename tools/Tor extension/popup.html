<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Tor Mode</title>
  <style>
    :root {
      --ink: #1b1f24;
      --muted: #6b7280;
      --border: #e3e5e8;
      --accent: #6e3ec1;
      --accent-hover: #5c2fa8;
      --good: #1a7f37;
      --bad: #c0392b;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .toggle-row .label {
      font-size: 13px;
      font-weight: 500;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }

    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(18px); }
    input:disabled + .slider { opacity: 0.5; cursor: default; }

    #stepText {
      font-size: 12px;
      color: var(--muted);
      min-height: 14px;
      margin-bottom: 10px;
    }

    ul#checklist {
      list-style: none;
      margin: 0 0 12px;
      padding: 0;
    }

    li.check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    li.check-item:last-child { border-bottom: none; }

    .icon {
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      font-weight: 700;
    }

    .icon.pending { color: var(--muted); }
    .icon.good { color: var(--good); }
    .icon.bad { color: var(--bad); }

    #resultBox {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
    }

    #resultBox.visible { display: block; }

    #resultBox div { margin-bottom: 3px; }
    #resultBox div:last-child { margin-bottom: 0; }

    .links {
      display: flex;
      gap: 8px;
    }

    .links button {
      flex: 1;
      padding: 6px 8px;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
    }

    .links button:hover {
      border-color: var(--accent);
      background: #f5f0fb;
    }
  </style>
</head>
<body>
  <h1>Tor Mode</h1>

  <div class="toggle-row">
    <span class="label" id="toggleLabel">Tor tunneling is off</span>
    <label class="switch">
      <input type="checkbox" id="torToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div id="stepText"></div>

  <ul id="checklist">
    <li class="check-item"><span class="icon pending" id="icon-service">○</span> Tor service running</li>
    <li class="check-item"><span class="icon pending" id="icon-port">○</span> SOCKS port (9050) open</li>
    <li class="check-item"><span class="icon pending" id="icon-tor">○</span> check.torproject.org confirms Tor</li>
    <li class="check-item"><span class="icon pending" id="icon-dns">○</span> DNS leak test (manual check)</li>
  </ul>

  <div id="resultBox">
    <div id="exitIpLine"></div>
    <div id="locationLine"></div>
  </div>

  <div class="links">
    <button id="openCheckTor">Open check.torproject.org</button>
    <button id="openDnsLeak">Open dnsleaktest.com</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
